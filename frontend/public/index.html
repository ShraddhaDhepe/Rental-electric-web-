<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6C63FF" />
    <meta name="description" content="RentoMojo - Rent or Buy Premium Electronics. TVs, Refrigerators, Washing Machines, ACs, Laptops and more." />
    <title>RentoMojo - Rent or Buy Electronics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: 'Inter', sans-serif; background: #f8f9fa; }
      :root {
        --primary: #6C63FF;
        --primary-dark: #5548D9;
        --secondary: #FF6B6B;
        --accent: #FFD93D;
        --success: #4CAF50;
        --warning: #FF9800;
        --danger: #F44336;
        --dark: #1a1a2e;
        --gray: #6c757d;
        --light-gray: #f1f3f5;
        --white: #ffffff;
        --shadow: 0 4px 20px rgba(0,0,0,0.08);
        --shadow-hover: 0 8px 30px rgba(108,99,255,0.2);
        --radius: 12px;
        --transition: all 0.3s ease;
      }
      .slick-dots li button:before { color: var(--primary); }
      .slick-prev, .slick-next { z-index: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
